<!DOCTYPE html>
<html>
<head>
<title>Update Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'home' %}">ReportCard</a>
  </div>
</nav>

<div class="container mt-5">
<div class="row justify-content-center">
<div class="col-md-6">
<div class="card shadow p-4">

<h3 class="text-center mb-4">Update Student</h3>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
{% endif %}

<form method="post">
{% csrf_token %}

<label class="form-label">Name</label>
<input name="name" value="{{ s.name }}" class="form-control mb-3" required>

<label class="form-label">Tamil</label>
<input name="tamil" value="{{ s.tamil }}" type="number" min="0" max="100" class="form-control mb-2" required>

<label class="form-label">English</label>
<input name="english" value="{{ s.english }}" type="number" min="0" max="100" class="form-control mb-2" required>

<label class="form-label">Maths</label>
<input name="maths" value="{{ s.maths }}" type="number" min="0" max="100" class="form-control mb-2" required>

<label class="form-label">Science</label>
<input name="science" value="{{ s.science }}" type="number" min="0" max="100" class="form-control mb-2" required>

<label class="form-label">Social</label>
<input name="social" value="{{ s.social }}" type="number" min="0" max="100" class="form-control mb-3" required>

<div class="d-flex justify-content-between">
  <a href="{% url 'home' %}" class="btn btn-secondary">
    <i class="fas fa-arrow-left"></i> Back
  </a>
  <button class="btn btn-primary">
    <i class="fas fa-save"></i> Update
  </button>
</div>

</form>

</div>
</div>
</div>
</div>

<!-- Bootstrap JS for dismissible alerts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

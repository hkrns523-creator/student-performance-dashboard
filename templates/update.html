<!DOCTYPE html>
<html>
<head>
<title>Update Student</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/"> ReportCard</a>
  </div>
</nav>

<!-- FORM CONTAINER -->
<div class="container mt-5">

<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4">

<h3 class="text-center mb-4"> Update Student</h3>

<form method="post">
{% csrf_token %}

<!-- Name -->
<label class="form-label">Name</label>
<input name="name" value="{{s.name}}" class="form-control mb-3">

<!-- Marks -->
<label class="form-label">Tamil</label>
<input name="tamil" value="{{s.tamil}}" type="number" min="0" max="100" class="form-control mb-2">

<label class="form-label">English</label>
<input name="english" value="{{s.english}}" type="number" min="0" max="100" class="form-control mb-2">

<label class="form-label">Maths</label>
<input name="maths" value="{{s.maths}}" type="number" min="0" max="100" class="form-control mb-2">

<label class="form-label">Science</label>
<input name="science" value="{{s.science}}" type="number" min="0" max="100" class="form-control mb-2">

<label class="form-label">Social</label>
<input name="social" value="{{s.social}}" type="number" min="0" max="100" class="form-control mb-2">

<!-- Buttons -->
<div class="d-flex justify-content-between">

<a href="/" class="btn btn-secondary">
  <i class="fas fa-arrow-left"></i> Back
</a>

<button class="btn btn-success">
  <i class="fas fa-save"></i> Update
</button>

</div>

</form>

</div>
</div>
</div>

</div>

</body>
</html>
